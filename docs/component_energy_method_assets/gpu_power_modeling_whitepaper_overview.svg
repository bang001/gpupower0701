<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">GPU power modeling experiment overview</title>
  <desc id="desc">Technical whitepaper diagram showing CUDA microbenchmark execution, treatment-control differential energy calculation, NCU counter validation, and component energy attribution from board-level measured power.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: Arial; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial; font-size: 15px; fill: #475569; }
      .panel-title { font-family: Arial; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .label { font-family: Arial; font-size: 15px; font-weight: 700; fill: #111827; }
      .small { font-family: Arial; font-size: 12.5px; fill: #475569; }
      .tiny { font-family: Arial; font-size: 11.5px; fill: #64748b; }
      .formula { font-family: Arial; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .caption { font-family: Arial; font-size: 14px; fill: #334155; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
      .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.2; rx: 8; }
      .box-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.2; rx: 8; }
      .box-amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.2; rx: 8; }
      .box-red { fill: #fff1f2; stroke: #fda4af; stroke-width: 1.2; rx: 8; }
      .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .dash-line { stroke: #64748b; stroke-width: 1.4; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="920" fill="#ffffff"/>

  <text x="64" y="58" class="title">GPU Power Modeling: Measurement-to-Attribution Flow</text>
  <text x="64" y="84" class="subtitle">CUDA microbenchmarks, NVML board power, NCU counter validation, and treatment-control differential coefficients</text>

  <!-- Panel backgrounds -->
  <rect x="54" y="118" width="465" height="650" class="panel"/>
  <rect x="567" y="118" width="465" height="650" class="panel"/>
  <rect x="1080" y="118" width="465" height="650" class="panel"/>

  <text x="84" y="158" class="panel-title">1. CUDA microbenchmark execution</text>
  <text x="597" y="158" class="panel-title">2. Differential energy coefficient</text>
  <text x="1110" y="158" class="panel-title">3. Component attribution</text>

  <!-- Left panel: execution and counters -->
  <rect x="90" y="188" width="160" height="70" class="box-blue"/>
  <text x="170" y="216" text-anchor="middle" class="label">Host CPU</text>
  <text x="170" y="238" text-anchor="middle" class="small">launch benchmark</text>

  <rect x="305" y="188" width="170" height="70" class="box-blue"/>
  <text x="390" y="214" text-anchor="middle" class="label">CUDA kernel</text>
  <text x="390" y="236" text-anchor="middle" class="small">mode, W_SM, blocks/SM</text>

  <path d="M 250 223 L 305 223" class="line"/>

  <rect x="118" y="300" width="330" height="126" class="box-green"/>
  <text x="283" y="330" text-anchor="middle" class="label">GPU board</text>
  <text x="283" y="356" text-anchor="middle" class="small">NVML/DCGM sampling window</text>
  <text x="283" y="384" text-anchor="middle" class="label">Board-level measured power</text>
  <text x="283" y="407" text-anchor="middle" class="tiny">P(t), energy delta, elapsed time</text>

  <path d="M 390 258 C 390 282, 370 293, 340 300" class="line"/>

  <rect x="93" y="468" width="380" height="210" class="box"/>
  <text x="283" y="499" text-anchor="middle" class="label">NCU counter validation</text>
  <text x="122" y="532" class="small">• Tensor Core operation count</text>
  <text x="122" y="560" class="small">• L1 traffic and L1 hit rate</text>
  <text x="122" y="588" class="small">• L2 traffic and L2 hit rate</text>
  <text x="122" y="616" class="small">• HBM traffic / memory bytes</text>
  <text x="122" y="644" class="small">• DRAM traffic and stall context</text>

  <path d="M 282 426 L 282 468" class="dash-line"/>

  <rect x="118" y="705" width="330" height="38" fill="#ffffff" stroke="#e2e8f0" rx="6"/>
  <text x="283" y="729" text-anchor="middle" class="tiny">Energy numerator from board power; counters validate path and denominator</text>

  <!-- Center panel: differential method -->
  <rect x="612" y="190" width="170" height="92" class="box"/>
  <text x="697" y="221" text-anchor="middle" class="label">Control kernel</text>
  <text x="697" y="245" text-anchor="middle" class="small">clocked_empty or</text>
  <text x="697" y="264" text-anchor="middle" class="small">reg_operand_only</text>

  <rect x="815" y="190" width="170" height="92" class="box-amber"/>
  <text x="900" y="221" text-anchor="middle" class="label">Treatment kernel</text>
  <text x="900" y="245" text-anchor="middle" class="small">reg_mma, L1, L2,</text>
  <text x="900" y="264" text-anchor="middle" class="small">shared, DRAM mode</text>

  <rect x="612" y="335" width="373" height="74" class="box-green"/>
  <text x="799" y="364" text-anchor="middle" class="label">Baseline subtraction</text>
  <text x="799" y="389" text-anchor="middle" class="formula">E_net = E_active - E_baseline</text>

  <path d="M 697 282 L 697 335" class="soft-line"/>
  <path d="M 900 282 L 900 335" class="soft-line"/>

  <rect x="612" y="455" width="373" height="92" class="box-amber"/>
  <text x="799" y="486" text-anchor="middle" class="label">Treatment-control ΔE</text>
  <text x="799" y="513" text-anchor="middle" class="formula">ΔE = E_treat - P_control × t_treat</text>

  <path d="M 799 409 L 799 455" class="line"/>

  <rect x="612" y="594" width="373" height="92" class="box-blue"/>
  <text x="799" y="623" text-anchor="middle" class="label">Effective energy coefficient</text>
  <text x="799" y="650" text-anchor="middle" class="formula">pJ/FLOP = ΔE / Δoperation</text>
  <text x="799" y="671" text-anchor="middle" class="formula">pJ/bit  = ΔE / Δbytes</text>

  <path d="M 799 547 L 799 594" class="line"/>

  <text x="799" y="724" text-anchor="middle" class="small">NCU counters gate acceptance and provide actual bytes when available</text>

  <!-- Cross-panel arrows -->
  <path d="M 519 360 C 548 360, 548 372, 567 372" class="line"/>
  <path d="M 519 573 C 548 573, 548 640, 612 640" class="dash-line"/>
  <path d="M 1032 640 C 1058 640, 1058 441, 1080 441" class="line"/>

  <!-- Right panel: component attribution -->
  <rect x="1118" y="188" width="388" height="78" class="box-green"/>
  <text x="1312" y="218" text-anchor="middle" class="label">Board-level measured energy</text>
  <text x="1312" y="242" text-anchor="middle" class="small">observed at GPU board/device level</text>

  <text x="1118" y="317" class="label">Component attribution</text>
  <text x="1118" y="342" class="small">Stacked contribution model after accepted differential tests</text>

  <!-- Stacked bar -->
  <rect x="1118" y="382" width="365" height="70" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <rect x="1128" y="394" width="72" height="46" fill="#94a3b8"/>
  <rect x="1200" y="394" width="62" height="46" fill="#6366f1"/>
  <rect x="1262" y="394" width="48" height="46" fill="#0f766e"/>
  <rect x="1310" y="394" width="57" height="46" fill="#2563eb"/>
  <rect x="1367" y="394" width="52" height="46" fill="#0891b2"/>
  <rect x="1419" y="394" width="42" height="46" fill="#b91c1c"/>
  <rect x="1461" y="394" width="12" height="46" fill="#a16207"/>

  <line x1="1128" y1="470" x2="1473" y2="470" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1164" y="492" text-anchor="middle" class="tiny">Static/</text>
  <text x="1164" y="507" text-anchor="middle" class="tiny">Baseline</text>
  <text x="1231" y="492" text-anchor="middle" class="tiny">Tensor</text>
  <text x="1231" y="507" text-anchor="middle" class="tiny">path</text>
  <text x="1286" y="492" text-anchor="middle" class="tiny">L1</text>
  <text x="1339" y="492" text-anchor="middle" class="tiny">L2</text>
  <text x="1393" y="492" text-anchor="middle" class="tiny">HBM</text>
  <text x="1440" y="492" text-anchor="middle" class="tiny">DRAM/</text>
  <text x="1440" y="507" text-anchor="middle" class="tiny">PHY</text>
  <text x="1480" y="492" text-anchor="start" class="tiny">Other</text>

  <rect x="1118" y="550" width="388" height="106" class="box-red"/>
  <text x="1312" y="583" text-anchor="middle" class="label">Not pure silicon-level energy</text>
  <text x="1148" y="614" class="small">Includes workload-dependent effects:</text>
  <text x="1148" y="638" class="tiny">scheduler, issue, cache controller, memory controller, PHY, stall, DVFS</text>

  <rect x="1118" y="692" width="388" height="50" fill="#ffffff" stroke="#e2e8f0" rx="6"/>
  <text x="1312" y="723" text-anchor="middle" class="small">Coefficients are accepted only after path validation and unit checks</text>

  <!-- Caption -->
  <rect x="54" y="806" width="1491" height="78" fill="#f8fafc" stroke="#e2e8f0" rx="10"/>
  <text x="84" y="836" class="caption">“GPU component energy breakdown is estimated from board-level power measurements, differential microbenchmarks, and NCU counter validation.</text>
  <text x="84" y="862" class="caption">The resulting coefficients represent workload-dependent effective board-level energy, not direct transistor-level measurements.”</text>
</svg>
